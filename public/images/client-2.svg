<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" width="640" height="440" role="img" aria-label="">
  <!-- Testimonial panel, variant 2. Decorative (alt=""), no faces, no rating —
       see client-1.svg for why. This one reads as a review thread in progress:
       a design frame with comment pins on it. -->
  <defs>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1ff"/>
      <stop offset="1" stop-color="#dfe3ec"/>
    </linearGradient>
  </defs>
  <rect width="640" height="440" fill="url(#c2)"/>

  <!-- The work under review -->
  <rect x="88" y="70" width="330" height="300" rx="16" fill="#ffffff"/>
  <rect x="88" y="70" width="330" height="34" rx="16" fill="#f6f7fa"/>
  <rect x="88" y="88" width="330" height="16" fill="#f6f7fa"/>
  <circle cx="112" cy="87" r="5" fill="#3458ff"/>
  <rect x="128" y="83" width="60" height="7" rx="3.5" fill="#dfe0eb"/>

  <rect x="116" y="132" width="150" height="13" rx="5" fill="#101010" opacity="0.78"/>
  <rect x="116" y="154" width="104" height="13" rx="5" fill="#101010" opacity="0.78"/>
  <rect x="116" y="186" width="200" height="7" rx="3.5" fill="#9a9dab"/>
  <rect x="116" y="202" width="168" height="7" rx="3.5" fill="#9a9dab"/>
  <rect x="116" y="230" width="92" height="26" rx="13" fill="#3458ff"/>
  <rect x="220" y="230" width="70" height="26" rx="13" fill="#ffffff" stroke="#dfe0eb"/>
  <rect x="116" y="280" width="274" height="66" rx="10" fill="#f6f7fa"/>
  <rect x="132" y="298" width="72" height="30" rx="6" fill="#e9ecf3"/>
  <rect x="214" y="298" width="72" height="30" rx="6" fill="#e9ecf3"/>
  <rect x="296" y="298" width="72" height="30" rx="6" fill="#e9ecf3"/>

  <!-- Comment pins: the shape of feedback, without the words -->
  <g>
    <path d="M300 120 a18 18 0 1 1 0.01 0 z M300 138 l-8 16 8 -6 z" fill="#3458ff"/>
    <path d="M170 260 a16 16 0 1 1 0.01 0 z M170 276 l-7 14 7 -5 z" fill="#101010" opacity="0.75"/>
