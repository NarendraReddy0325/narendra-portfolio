<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" width="720" height="450" role="img" aria-label="Design tokens resolving into a grid of components">
  <!-- "What I learned designing my first design system" — raw tokens on the
       left resolving into built components on the right. 16:10, matching the
       card's aspect-[16/10] so object-cover has nothing to crop. -->
  <rect width="720" height="450" fill="#e9ecf3"/>
  <rect x="40" y="40" width="640" height="370" rx="16" fill="#ffffff"/>

  <text x="68" y="82" fill="#9a9dab" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="0.1em">TOKENS</text>
  <g>
    <rect x="68" y="100" width="180" height="34" rx="6" fill="#f6f7fa"/>
    <circle cx="88" cy="117" r="8" fill="#3458ff"/>
    <rect x="106" y="114" width="80" height="6" rx="3" fill="#dfe0eb"/>
    <rect x="68" y="142" width="180" height="34" rx="6" fill="#f6f7fa"/>
    <circle cx="88" cy="159" r="8" fill="#101010"/>
    <rect x="106" y="156" width="62" height="6" rx="3" fill="#dfe0eb"/>
    <rect x="68" y="184" width="180" height="34" rx="6" fill="#f6f7fa"/>
    <circle cx="88" cy="201" r="8" fill="#cdd5fb"/>
    <rect x="106" y="198" width="92" height="6" rx="3" fill="#dfe0eb"/>
    <rect x="68" y="226" width="180" height="34" rx="6" fill="#f6f7fa"/>
    <circle cx="88" cy="243" r="8" fill="#9a9dab"/>
    <rect x="106" y="240" width="70" height="6" rx="3" fill="#dfe0eb"/>
    <rect x="68" y="268" width="180" height="34" rx="6" fill="#f6f7fa"/>
    <rect x="80" y="279" width="16" height="12" rx="3" fill="#e9ecf3" stroke="#dfe0eb"/>
    <rect x="106" y="282" width="86" height="6" rx="3" fill="#dfe0eb"/>
    <rect x="68" y="310" width="180" height="34" rx="6" fill="#f6f7fa"/>
    <rect x="80" y="321" width="16" height="12" rx="6" fill="#e9ecf3" stroke="#dfe0eb"/>
    <rect x="106" y="324" width="58" height="6" rx="3" fill="#dfe0eb"/>
  </g>

  <path d="M276 222 l16 -9 v18 z" fill="#3458ff" opacity="0.6"/>

  <text x="320" y="82" fill="#9a9dab" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="0.1em">COMPONENTS</text>
  <g>
    <rect x="320" y="100" width="160" height="96" rx="10" fill="#f6f7fa" stroke="#dfe0eb"/>
    <rect x="338" y="120" width="70" height="9" rx="4" fill="#101010" opacity="0.75"/>
    <rect x="338" y="138" width="110" height="5" rx="2" fill="#9a9dab"/>
    <rect x="338" y="162" width="62" height="18" rx="9" fill="#3458ff"/>

    <rect x="496" y="100" width="160" height="96" rx="10" fill="#f6f7fa" stroke="#dfe0eb"/>
    <circle cx="522" cy="128" r="12" fill="#cdd5fb"/>
    <rect x="544" y="118" width="60" height="7" rx="3" fill="#101010" opacity="0.7"/>
    <rect x="544" y="132" width="86" height="5" rx="2" fill="#9a9dab"/>
    <rect x="514" y="162" width="124" height="18" rx="6" fill="#ffffff" stroke="#dfe0eb"/>

    <rect x="320" y="212" width="160" height="96" rx="10" fill="#f6f7fa" stroke="#dfe0eb"/>
