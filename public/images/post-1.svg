    <rect x="514" y="230" width="124" height="8" rx="4" fill="#dfe0eb"/>
    <rect x="514" y="230" width="76" height="8" rx="4" fill="#3458ff"/>
    <rect x="514" y="254" width="100" height="6" rx="3" fill="#9a9dab"/>
    <rect x="514" y="268" width="70" height="6" rx="3" fill="#9a9dab"/>
