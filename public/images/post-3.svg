<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" width="720" height="450" role="img" aria-label="A funnel where one step loses most of its users while the feedback stays empty">
  <!-- "The usability problems users feel but never report" — a funnel whose
       fourth step quietly haemorrhages users while the feedback bubbles sit
       empty. That gap between the data and the complaints IS the article.
       Deliberately unlabelled numbers except the drop, which is the point.
       16:10, matching the card. -->
  <rect width="720" height="450" fill="#e9ecf3"/>
  <rect x="40" y="40" width="640" height="370" rx="16" fill="#ffffff"/>

  <text x="68" y="82" fill="#9a9dab" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="0.1em">WHERE THEY GO</text>

  <g>
    <rect x="68" y="102" width="96" height="150" rx="8" fill="#f6f7fa" stroke="#dfe0eb"/>
    <rect x="68" y="122" width="96" height="130" rx="8" fill="#cdd5fb"/>
    <rect x="180" y="102" width="96" height="150" rx="8" fill="#f6f7fa" stroke="#dfe0eb"/>
    <rect x="180" y="132" width="96" height="120" rx="8" fill="#cdd5fb"/>
    <rect x="292" y="102" width="96" height="150" rx="8" fill="#f6f7fa" stroke="#dfe0eb"/>
    <rect x="292" y="144" width="96" height="108" rx="8" fill="#cdd5fb"/>

    <rect x="404" y="102" width="96" height="150" rx="8" fill="#f6f7fa" stroke="#3458ff" stroke-width="2"/>
    <rect x="404" y="218" width="96" height="34" rx="8" fill="#3458ff"/>

    <rect x="516" y="102" width="96" height="150" rx="8" fill="#f6f7fa" stroke="#dfe0eb"/>
    <rect x="516" y="226" width="96" height="26" rx="8" fill="#cdd5fb"/>
  </g>

  <g fill="#9a9dab" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">
    <text x="98" y="272">Step 1</text>
    <text x="210" y="272">Step 2</text>
    <text x="322" y="272">Step 3</text>
    <text x="434" y="272" fill="#3458ff">Step 4</text>
    <text x="548" y="272">Done</text>
  </g>

  <circle cx="452" cy="288" r="4" fill="#3458ff"/>
  <path d="M452 288 l0 24" stroke="#3458ff" stroke-width="2" stroke-linecap="round"/>
  <rect x="300" y="316" width="316" height="56" rx="10" fill="#eef1ff"/>
  <text x="322" y="340" fill="#3458ff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Most of them leave here</text>
  <text x="322" y="359" fill="#101010" opacity="0.55" font-family="Inter, system-ui, sans-serif" font-size="12">and not one of them said a word</text>

  <g>
    <rect x="68" y="316" width="94" height="30" rx="10" fill="#f6f7fa" stroke="#dfe0eb"/>
    <circle cx="94" cy="331" r="3" fill="#dfe0eb"/><circle cx="106" cy="331" r="3" fill="#dfe0eb"/><circle cx="118" cy="331" r="3" fill="#dfe0eb"/>
    <rect x="176" y="316" width="94" height="30" rx="10" fill="#f6f7fa" stroke="#dfe0eb"/>
    <circle cx="202" cy="331" r="3" fill="#dfe0eb"/><circle cx="214" cy="331" r="3" fill="#dfe0eb"/><circle cx="226" cy="331" r="3" fill="#dfe0eb"/>
    <rect x="68" y="356" width="94" height="30" rx="10" fill="#f6f7fa" stroke="#dfe0eb"/>
    <circle cx="94" cy="371" r="3" fill="#dfe0eb"/><circle cx="106" cy="371" r="3" fill="#dfe0eb"/><circle cx="118" cy="371" r="3" fill="#dfe0eb"/>
  </g>
</svg>
