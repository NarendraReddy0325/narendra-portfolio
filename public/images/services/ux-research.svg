<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 584 326" width="584" height="326" role="img" aria-label="An affinity map: loose observations clustered into named themes">
  <!-- UX Research: an affinity map mid-cluster. Loose notes on the left get
       grouped, then named as themes on the right — the shape of the work rather
       than a photo of a whiteboard.

       viewBox is 584x326 = 1.79, matching the 292x163 box this renders into, so
       object-cover has nothing to crop. Measured, not guessed: the first cut of
       this was 2.94 and lost its whole left column. -->
  <rect width="584" height="326" fill="#f6f7fa"/>

  <!-- Swimlanes -->
  <g stroke="#dfe0eb" stroke-width="1.5">
    <line x1="200" y1="36" x2="200" y2="290"/>
    <line x1="388" y1="36" x2="388" y2="290"/>
  </g>

  <g fill="#9a9dab" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="0.1em">
    <text x="30" y="30">OBSERVED</text>
    <text x="222" y="30">GROUPED</text>
    <text x="410" y="30">THEMES</text>
  </g>

  <!-- Loose notes: rotated, uneven, overlapping slightly -->
  <g>
    <rect x="30" y="56" width="76" height="52" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5" transform="rotate(-5 68 82)"/>
    <rect x="112" y="74" width="76" height="52" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5" transform="rotate(4 150 100)"/>
    <rect x="34" y="132" width="76" height="52" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5" transform="rotate(6 72 158)"/>
    <rect x="114" y="156" width="76" height="52" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5" transform="rotate(-4 152 182)"/>
    <rect x="40" y="212" width="76" height="52" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5" transform="rotate(-7 78 238)"/>
    <rect x="118" y="234" width="70" height="48" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5" transform="rotate(5 153 258)"/>
  </g>

  <!-- Grouped: aligned, one cluster tinted -->
  <g>
    <rect x="222" y="56" width="72" height="44" rx="6" fill="#eef1ff" stroke="#cdd5fb" stroke-width="1.5"/>
    <rect x="302" y="56" width="72" height="44" rx="6" fill="#eef1ff" stroke="#cdd5fb" stroke-width="1.5"/>
    <rect x="222" y="110" width="72" height="44" rx="6" fill="#eef1ff" stroke="#cdd5fb" stroke-width="1.5"/>
    <rect x="302" y="110" width="72" height="44" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5"/>
    <rect x="222" y="176" width="72" height="44" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5"/>
    <rect x="302" y="176" width="72" height="44" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5"/>
    <rect x="222" y="230" width="72" height="44" rx="6" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5"/>
  </g>

  <!-- Themes: the output, named and ranked -->
  <g>
    <rect x="410" y="56" width="146" height="66" rx="8" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5"/>
    <rect x="426" y="74" width="14" height="14" rx="3" fill="#3458ff"/>
    <rect x="450" y="76" width="86" height="6" rx="3" fill="#101010" opacity="0.75"/>
    <rect x="450" y="90" width="54" height="6" rx="3" fill="#9a9dab"/>
    <rect x="426" y="100" width="110" height="6" rx="3" fill="#eef1ff"/>
    <rect x="426" y="100" width="76" height="6" rx="3" fill="#cdd5fb"/>

    <rect x="410" y="134" width="146" height="66" rx="8" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5"/>
    <rect x="426" y="152" width="14" height="14" rx="3" fill="#3458ff" opacity="0.55"/>
    <rect x="450" y="154" width="70" height="6" rx="3" fill="#101010" opacity="0.75"/>
    <rect x="450" y="168" width="62" height="6" rx="3" fill="#9a9dab"/>
    <rect x="426" y="178" width="110" height="6" rx="3" fill="#eef1ff"/>
    <rect x="426" y="178" width="48" height="6" rx="3" fill="#cdd5fb"/>

    <rect x="410" y="212" width="146" height="62" rx="8" fill="#ffffff" stroke="#dfe0eb" stroke-width="1.5"/>
    <rect x="426" y="230" width="14" height="14" rx="3" fill="#3458ff" opacity="0.3"/>
    <rect x="450" y="232" width="58" height="6" rx="3" fill="#101010" opacity="0.75"/>
    <rect x="450" y="246" width="72" height="6" rx="3" fill="#9a9dab"/>
  </g>

  <!-- Flow: scattered -> grouped -> named -->
  <g fill="#3458ff" opacity="0.55">
    <path d="M192 160 l12 -7 v14 z"/>
    <path d="M380 160 l12 -7 v14 z"/>
  </g>
</svg>
