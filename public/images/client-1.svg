<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" width="640" height="440" role="img" aria-label="">
  <!-- The Testimonials panel. Renders with alt="" — decorative — which is the
       only reason artwork belongs here at all: it makes no claim about who said
       anything. A stock photograph of a stranger beside a quote credited to
       "Client name" would be a fabricated endorsement, so there are no faces
       here and there is no rating.

       The panel is aspect-[4/3] on mobile and free-height at lg, so no single
       viewBox can fit both. Composition is centre-weighted and the edges are
       filler, so object-cover can crop either way without losing anything. -->
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dfe3ec"/>
      <stop offset="1" stop-color="#eef1ff"/>
    </linearGradient>
  </defs>
  <rect width="640" height="440" fill="url(#c1)"/>

  <!-- An oversized quote mark, set as geometry rather than type -->
  <g fill="#3458ff" opacity="0.14">
    <path d="M96 250 c0 -52 34 -96 84 -110 l10 26 c-30 10 -48 32 -48 56 l38 0 0 76 -84 0 z"/>
    <path d="M214 250 c0 -52 34 -96 84 -110 l10 26 c-30 10 -48 32 -48 56 l38 0 0 76 -84 0 z"/>
  </g>

  <!-- Message bubbles, deliberately wordless: nothing here puts words in
       anyone's mouth. -->
  <g>
    <rect x="330" y="92" width="220" height="76" rx="18" fill="#ffffff"/>
    <rect x="352" y="116" width="150" height="7" rx="3.5" fill="#dfe0eb"/>
    <rect x="352" y="134" width="110" height="7" rx="3.5" fill="#e9ecf3"/>

    <rect x="286" y="188" width="264" height="92" rx="18" fill="#3458ff"/>
    <rect x="310" y="214" width="186" height="7" rx="3.5" fill="#ffffff" opacity="0.85"/>
    <rect x="310" y="232" width="216" height="7" rx="3.5" fill="#ffffff" opacity="0.55"/>
    <rect x="310" y="250" width="140" height="7" rx="3.5" fill="#ffffff" opacity="0.4"/>

    <rect x="330" y="300" width="188" height="68" rx="18" fill="#ffffff"/>
    <rect x="352" y="322" width="120" height="7" rx="3.5" fill="#dfe0eb"/>
    <rect x="352" y="340" width="84" height="7" rx="3.5" fill="#e9ecf3"/>
  </g>

  <!-- A typing indicator: the reply that hasn't landed yet -->
  <g>
    <rect x="96" y="352" width="94" height="36" rx="18" fill="#ffffff"/>
    <circle cx="124" cy="370" r="4.5" fill="#cdd5fb"/>
    <circle cx="143" cy="370" r="4.5" fill="#cdd5fb"/>
    <circle cx="162" cy="370" r="4.5" fill="#cdd5fb"/>
  </g>
</svg>
